# .github/workflows/lint-gates.yml
#
# Self-contained lint gates — no external reusable workflows. Each check runs
# inline so it's enforced today:
#   - license-check: spot-check (LICENSE present + MIT in package.json).
#   - no-lifecycle-scripts: spot-check (package.json scripts allowlist).
#   - readme-lint: README + .ai triplet + agent-stub presence check.

name: Lint Gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  readme-lint:
    name: readme lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify README + .ai triplet + stubs exist
        run: |
          set -e
          test -f README.md
          test -f .ai/guidelines.md
          test -f .ai/ARCHITECTURE.md
          test -f .ai/CONVENTIONS.md
          test -f AGENTS.md
          test -f CLAUDE.md
          test -f GEMINI.md

  license-check:
    name: license check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify MIT license in package.json + LICENSE present
        run: |
          set -e
          test -f LICENSE
          node -e "process.exit(require('./package.json').license === 'MIT' ? 0 : 1)"

  no-lifecycle-scripts:
    name: no lifecycle scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify no preinstall/postinstall/prepublish scripts
        run: |
          set -e
          node -e "
            const s = require('./package.json').scripts || {};
            const forbidden = ['preinstall', 'install', 'postinstall', 'prepublish', 'prepare', 'prepublishOnly', 'prepack', 'postpack'];
            const found = forbidden.filter(k => s[k]);
            if (found.length) {
              console.error('Forbidden lifecycle scripts present:', found);
              process.exit(1);
            }
          "
