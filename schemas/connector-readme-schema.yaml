# Per-connector README frontmatter schema
# Authoritative source for the YAML frontmatter required at the top of every
# src/providers/<id>/README.md file. See .ai/CONVENTIONS.md for the AI-agent
# cheatsheet; this file is the canonical schema enforced by
# `scripts/validate-frontmatter.mjs`.
$schema: https://json-schema.org/draft/2020-12/schema
type: object
required:
  - providerId
  - channel
  - auth
  - endpoint
  - versioning
  - notes_passthrough
properties:
  providerId:
    type: string
    pattern: '^[a-z][a-z0-9-]*$'
  channel:
    type: string
    enum: [email, sms, push, chat]
  auth:
    type: object
    required: [method, tokenLifecycle, tokenCacheHookSupported]
    properties:
      method:
        type: string
        enum:
          - api-key-header
          - api-key-query
          - basic-auth
          - bearer
          - oauth2-client-credentials
          - jwt-rs256
          - jwt-es256
          - aws-sigv4
          - hmac
          - webhook-url-secret
          - bot-token-url
          - dual-header
          - none
      tokenLifecycle:
        type: string
        enum: [static, rotating, short-lived-signed, vendor-managed]
      tokenCacheHookSupported:
        type: boolean
    additionalProperties: false
  endpoint:
    type: object
    required: [default]
    properties:
      default:
        type: string
        format: uri
      regional:
        type: array
        items:
          type: string
    additionalProperties: false
  versioning:
    type: object
    required: [vendorApiVersion, lastVerified]
    properties:
      vendorApiVersion:
        type: string
      lastVerified:
        type: string
        format: date
    additionalProperties: false
  notes_passthrough:
    type: string
  regions:
    type: array
    items:
      type: string
  attachments_supported:
    type: boolean
  templates_supported:
    type: boolean
  novuProviderId:
    type: [string, "null"]
  tier:
    type: integer
    enum: [1, 2, 3]
additionalProperties: false
